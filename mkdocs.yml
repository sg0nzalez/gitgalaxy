site_name: GitGalaxy
site_description: The structural DNA of massive software repositories.
site_url: https://squid-protocol.github.io/gitgalaxy/
site_dir: docs_build

repo_name: squid-protocol/gitgalaxy
repo_url: https://github.com/squid-protocol/gitgalaxy

### ADDED: Global Copyright Footer
copyright: Copyright &copy; 2026 Joseph Michael Esquibel

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: cyan

### ADDED: Social links for the bottom footer
extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://gitgalaxy.io/
      name: GitGalaxy Visualizer
    - icon: fontawesome/brands/github
      link: https://github.com/squid-protocol/gitgalaxy
      name: GitHub Source Code

docs_dir: docs/wiki

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - tables
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js

