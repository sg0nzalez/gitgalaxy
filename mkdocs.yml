site_name: GitGalaxy
site_description: The structural DNA of massive software repositories.
site_url: https://squid-protocol.github.io/gitgalaxy/

theme:
  name: material
  palette:
    # Cyber-Noir aesthetic
    scheme: slate
    primary: deep purple
    accent: cyan

# Tell MkDocs exactly where our markdown files live
docs_dir: docs/wiki

# Optional: Add some neat markdown extensions for formatting
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - tables

