# GitGalaxy Enterprise Security Scanner
# Integration: GitLab CI/CD Component
#
# This is a generic, single-tool component — call it once per tool to build
# the 4-check Golden Path (vault-sentinel, xray-inspector,
# supply-chain-firewall, galaxyscope). See github-action-readme.md for the
# full tool directory. Only 'galaxyscope' accepts the args in the example
# below (--config, --fail-on-malware, --sarif-only, --output); the three
# sentinel tools take no flags beyond the target path.

spec:
  inputs:
    tool:
      description: "The GitGalaxy command to execute (galaxyscope, vault-sentinel, xray-inspector, or supply-chain-firewall)."
      default: "galaxyscope"
    target:
      description: "The directory or file path to scan."
      default: "."
    args:
      description: "Additional CLI arguments. Only meaningful for 'galaxyscope' — the sentinel tools accept no flags."
      default: ""
    version:
      description: "The version of GitGalaxy to install from PyPI. Defaults to latest."
      default: "latest"
    full_precision:
      description: "Opt-in to install heavy physics engines for Blast Radius and ML Threat Inference. Only relevant when tool: galaxyscope."
      default: "false"

---

gitgalaxy_scan:
  stage: test
  image: python:3.12-slim
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    GIT_DEPTH: "0"
  cache:
    paths:
      - .cache/pip
  script:
    - echo "Initializing GitGalaxy Component Environment..."
    - export GG_TOOL="$[[ inputs.tool ]]"
    - export GG_TARGET="$[[ inputs.target ]]"
    - export GG_ARGS="$[[ inputs.args ]]"
    - export GG_VERSION="$[[ inputs.version ]]"
    - export GG_FULL_PRECISION="$[[ inputs.full_precision ]]"
    - export GITGALAXY_LICENSE_KEY="COMMUNITY_FREE_TIER"

    - pip install --upgrade pip
    - |
      if [ "$GG_VERSION" = "local" ]; then
        echo "Dogfooding local GitGalaxy source..."
        pip install -e .
      elif [ "$GG_VERSION" = "latest" ]; then
        echo "Installing latest GitGalaxy from PyPI..."
        pip install gitgalaxy
      else
        echo "Installing GitGalaxy version ${GG_VERSION}..."
        pip install "gitgalaxy==${GG_VERSION}"
      fi
    - |
      if [ "$GG_FULL_PRECISION" = "true" ]; then
        echo "Unlocking Full Precision Mode..."
        pip install networkx tiktoken xgboost pandas numpy
      else
        echo "Running in ultra-fast Zero-Dependency Mode."
      fi

    - 'echo "Running: ${GG_TOOL} ${GG_TARGET} ${GG_ARGS}"'
    - ${GG_TOOL} ${GG_TARGET} ${GG_ARGS}
  artifacts:
    when: always
    reports:
      # Only populated when tool: galaxyscope --sarif-only is used.
      # Harmless no-op (GitLab just won't find the file) for the sentinel tools.
      sast: gitgalaxy-results_sarif.json
  allow_failure: false
