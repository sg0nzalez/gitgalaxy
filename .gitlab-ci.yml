include:
  - local: '/templates/scan.yml'
    inputs:
      target: 'gitgalaxy/'
      version: 'local'

create-release:
  stage: deploy
  image: https://registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Publishing CI/CD Catalog Release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Automated component release synced directly from GitHub Source of Truth."