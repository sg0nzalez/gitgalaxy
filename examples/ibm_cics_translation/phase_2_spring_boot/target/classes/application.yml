server:
  port: 8080

spring:
  application:
    name: cics-cobol
    
  datasource:
    # TODO: Update these credentials for your target environment
    url: jdbc:postgresql://localhost:5432/cics_cobol
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update # Automatically creates tables from Entities
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false # Prevents batch jobs from auto-running on startup
