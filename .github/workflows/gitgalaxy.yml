supply-chain-firewall:
    name: Supply Chain Firewall
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./
        with:
          tool: supply-chain-firewall
          target: .
          version: local