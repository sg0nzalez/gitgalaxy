name: Muninn Security Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  muninn:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Muninn
        # zizmor: ignore[github_action_from_unverified_creator_used]
        uses: skaldlab/muninn@daf98872b5748d015ed5bd828296175f6bc0115d # v0.3.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: info
          format: sarif,comment

      - name: Upload SARIF
        if: always() && hashFiles('muninn.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: muninn.sarif
