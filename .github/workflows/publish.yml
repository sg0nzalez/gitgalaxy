name: Publish to PyPI and Sync to GitLab

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  pypi-publish:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gitgalaxy
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce Main Branch Tagging
        run: |
          git fetch origin main
          if ! git branch -r --contains ${{ github.sha }} | grep -q "origin/main"; then
            echo "🛑 ERROR: Tag was cut from a side branch. Releases are only allowed from main."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build the wheel and source distribution
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  gitlab-sync:
    name: Sync to GitLab Component Catalog
    needs: pypi-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Code and Tags to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_SYNC_TOKEN }}@gitlab.com/squid-protocol1/gitgalaxy.git
          git push -f gitlab HEAD:main
          git push -f --tags gitlab

  bitbucket-sync:
    name: Sync to Bitbucket Repository
    needs: pypi-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Code and Tags to Bitbucket
        run: |
          git remote add bitbucket https://${{ secrets.BITBUCKET_USERNAME }}:${{ secrets.BITBUCKET_SYNC_TOKEN }}@bitbucket.org/squid-protocol/gitgalaxy.git
          git push -f bitbucket HEAD:main
          git push -f --tags bitbucket

  azure-sync:
    name: Sync to Azure DevOps Repository
    needs: pypi-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Code and Tags to Azure
        run: |
          git remote add azure https://gitgalaxy:${{ secrets.AZURE_DEVOPS_TOKEN }}@dev.azure.com/gitgalaxy/gitgalaxy/_git/gitgalaxy
          git push -f azure HEAD:main
          git push -f --tags azure
