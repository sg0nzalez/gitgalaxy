name: GitGalaxy Smoke Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Global Syntax Sweep (Flake8)
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Smoke Test - Core Engine
      run: python gitgalaxy/galaxyscope.py --help

    - name: Smoke Test - Legacy Refractor Controller
      run: python gitgalaxy/cobol_refractor_controller.py --help

    - name: Smoke Test - Java Spring Forge Controller
      run: python gitgalaxy/cobol_to_java_controller.py --help

    - name: Smoke Test - SBOM Generator
      run: python gitgalaxy/tools/compliance/sbom_generator.py --help

    - name: Smoke Test - Supply Chain Firewall
      run: python gitgalaxy/tools/supply_chain_security/supply_chain_firewall.py --help

    - name: Smoke Test - API Network Map
      run: python gitgalaxy/tools/network_auditing/full_api_network_map.py --help

    - name: Golden Record Integration Test (Pytest)
      run: |
        pip install pytest
        pytest tests/ -v